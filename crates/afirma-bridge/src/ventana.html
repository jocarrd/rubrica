<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rúbrica · Firma desde la sede</title>
<style>
  :root {
    --bg: #f3f4f6; --card: #ffffff; --text: #161a21; --muted: #6b7280;
    --line: #e6e8ee; --field: #f8f9fb; --accent: #2563eb; --accent-soft: #eff4ff;
    --ok-bg: #e7f6ec; --ok-fg: #14773c; --err-bg: #fdecec; --err-fg: #b42318;
    --shadow: 0 10px 40px rgba(20,30,60,.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115; --card: #181b21; --text: #e8eaed; --muted: #9aa0ac;
      --line: #2a2e37; --field: #20242c; --accent: #4f8cff; --accent-soft: #1b2438;
      --ok-bg: #14301f; --ok-fg: #5fd08a; --err-bg: #3a1d1d; --err-fg: #f2918a;
      --shadow: 0 10px 40px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: var(--card); border-radius: 20px; box-shadow: var(--shadow);
    padding: 30px 34px; width: 100%; max-width: 440px;
    animation: rise .3s ease;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .brand { display: flex; align-items: center; gap: 11px; margin-bottom: 16px; }
  .logo {
    width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), #7aa6ff);
    display: flex; align-items: center; justify-content: center; color: #fff; font-size: 19px; font-weight: 800;
  }
  h1 { margin: 0; font-size: 21px; letter-spacing: -.02em; }
  .req {
    background: var(--field); border: 1px solid var(--line); border-radius: 13px;
    padding: 13px 15px; font-size: 13px; color: var(--muted); margin-bottom: 22px; line-height: 1.5;
  }
  .req b { color: var(--text); }
  .label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 0 0 10px; }
  .cert {
    display: flex; align-items: center; gap: 12px;
    border: 1.5px solid var(--line); border-radius: 13px;
    padding: 13px 15px; margin-bottom: 9px; cursor: pointer;
    transition: border-color .13s, background .13s;
  }
  .cert:hover { border-color: #aeb8cc; }
  .cert.sel { border-color: var(--accent); background: var(--accent-soft); }
  .cert .ico { width: 36px; height: 36px; border-radius: 10px; background: var(--field); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .cert.sel .ico { background: var(--accent); }
  .cert .nm { flex: 1; font-size: 14px; font-weight: 600; word-break: break-word; }
  .cert .ck { width: 22px; height: 22px; flex-shrink: 0; color: var(--accent); font-weight: 800; opacity: 0; transition: opacity .13s; }
  .cert.sel .ck { opacity: 1; }
  .empty { color: var(--err-fg); font-size: 14px; padding: 14px; background: var(--err-bg); border-radius: 11px; }
  input[type=password] {
    width: 100%; padding: 13px 14px; border: 1.5px solid var(--line); border-radius: 13px;
    font-size: 14px; margin-top: 14px; background: var(--field); color: var(--text);
  }
  input[type=password]:focus { outline: none; border-color: var(--accent); }
  button {
    width: 100%; margin-top: 18px; padding: 14px; border: 0; border-radius: 13px;
    background: var(--accent); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    transition: filter .15s, opacity .15s;
  }
  button:hover:not(:disabled) { filter: brightness(1.07); }
  button:disabled { opacity: .4; cursor: default; }
  details { margin-top: 16px; }
  summary { cursor: pointer; color: var(--muted); font-size: 12px; }
  pre { background: var(--field); border: 1px solid var(--line); border-radius: 10px; padding: 12px; font-size: 11px; overflow-x: auto; color: var(--muted); }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">R</div>
      <h1>Rúbrica</h1>
    </div>

    <div class="req">
      Una sede electrónica solicita tu firma.<br>
      Operación <b>{{OPERACION}}</b> · <b>{{SERVIDOR}}</b>
    </div>

    <p class="label">Elige tu certificado</p>
    <div id="lista">{{OPCIONES_CERT}}</div>

    <input type="password" id="pass" placeholder="Contraseña del certificado" autocomplete="off">
    <button id="firmar" disabled>Firmar</button>

    <details>
      <summary>Detalle técnico</summary>
      <pre>{{DETALLE}}</pre>
    </details>
  </div>

<script>
  const certs = document.querySelectorAll('.cert');
  const btn = document.getElementById('firmar');
  let elegido = null;
  certs.forEach((c) => {
    c.addEventListener('click', () => {
      certs.forEach((x) => x.classList.remove('sel'));
      c.classList.add('sel');
      elegido = c.dataset.ruta;
      btn.disabled = false;
    });
  });
  btn.addEventListener('click', () => {
    btn.textContent = 'Firmando…';
    btn.disabled = true;
    fetch('/firmar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ certificado: elegido, password: document.getElementById('pass').value }),
    }).then((r) => r.json()).then((d) => {
      btn.textContent = d.ok ? 'Firmado ✓' : 'Error al firmar';
      btn.style.background = d.ok ? '#14773c' : '#b42318';
    }).catch(() => { btn.textContent = 'Error de conexión'; btn.style.background = '#b42318'; });
  });
</script>
</body>
</html>
