<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rúbrica</title>
<style>
  :root {
    --bg: #f3f4f6;
    --card: #ffffff;
    --text: #161a21;
    --muted: #6b7280;
    --line: #e6e8ee;
    --field: #f8f9fb;
    --accent: #2563eb;
    --accent-soft: #eff4ff;
    --ok-bg: #e7f6ec; --ok-fg: #14773c;
    --err-bg: #fdecec; --err-fg: #b42318;
    --shadow: 0 10px 40px rgba(20,30,60,.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115; --card: #181b21; --text: #e8eaed; --muted: #9aa0ac;
      --line: #2a2e37; --field: #20242c; --accent: #4f8cff; --accent-soft: #1b2438;
      --ok-bg: #14301f; --ok-fg: #5fd08a; --err-bg: #3a1d1d; --err-fg: #f2918a;
      --shadow: 0 10px 40px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: var(--card); border-radius: 20px; box-shadow: var(--shadow);
    padding: 34px 36px; width: 100%; max-width: 440px;
    animation: rise .3s ease;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .brand { display: flex; align-items: center; gap: 11px; margin-bottom: 4px; }
  .logo {
    width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), #7aa6ff);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 20px; font-weight: 800;
  }
  h1 { margin: 0; font-size: 23px; letter-spacing: -.02em; }
  .sub { margin: 2px 0 26px 47px; color: var(--muted); font-size: 13px; }
  .field { margin-bottom: 16px; }
  .field > span { display: block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 7px; }
  .drop {
    border: 1.5px dashed var(--line); border-radius: 13px; padding: 16px;
    display: flex; align-items: center; gap: 12px; cursor: pointer;
    transition: border-color .15s, background .15s; background: var(--field);
  }
  .drop:hover { border-color: var(--accent); }
  .drop.has { border-style: solid; border-color: var(--accent); background: var(--accent-soft); }
  .drop .ic { font-size: 20px; }
  .drop .tx { font-size: 14px; color: var(--muted); flex: 1; word-break: break-word; }
  .drop.has .tx { color: var(--text); font-weight: 600; }
  input[type=file] { display: none; }
  input[type=password] {
    width: 100%; padding: 13px 14px; border: 1.5px solid var(--line); border-radius: 13px;
    font-size: 14px; background: var(--field); color: var(--text);
  }
  input[type=password]:focus { outline: none; border-color: var(--accent); }
  button {
    width: 100%; margin-top: 22px; padding: 14px; border: 0; border-radius: 13px;
    background: var(--accent); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    transition: filter .15s, opacity .15s;
  }
  button:hover:not(:disabled) { filter: brightness(1.07); }
  button:disabled { opacity: .4; cursor: default; }
  #status { margin-top: 16px; padding: 13px; border-radius: 11px; font-size: 14px; display: none; }
  #status.ok { display: block; background: var(--ok-bg); color: var(--ok-fg); }
  #status.err { display: block; background: var(--err-bg); color: var(--err-fg); }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">R</div>
      <h1>Rúbrica</h1>
    </div>
    <p class="sub">Firma electrónica · PAdES · CAdES · XAdES</p>

    <div class="field">
      <span>Documento</span>
      <label class="drop" id="dropDoc" for="doc">
        <span class="ic">📄</span><span class="tx" id="txDoc">Selecciona el documento a firmar</span>
      </label>
      <input type="file" id="doc">
    </div>

    <div class="field">
      <span>Certificado</span>
      <label class="drop" id="dropCert" for="cert">
        <span class="ic">🔑</span><span class="tx" id="txCert">Selecciona tu certificado (.p12 / .pfx)</span>
      </label>
      <input type="file" id="cert">
    </div>

    <div class="field">
      <span>Contraseña</span>
      <input type="password" id="pass" placeholder="Contraseña del certificado" autocomplete="off">
    </div>

    <button id="sign" disabled>Firmar</button>
    <div id="status"></div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const doc = $("doc"), cert = $("cert"), pass = $("pass"), btn = $("sign"), status = $("status");

function refrescar(input, drop, tx, base) {
  if (input.files[0]) {
    drop.classList.add("has");
    tx.textContent = input.files[0].name;
  } else {
    drop.classList.remove("has");
    tx.textContent = base;
  }
  btn.disabled = !(doc.files[0] && cert.files[0]);
}
doc.onchange = () => refrescar(doc, $("dropDoc"), $("txDoc"), "Selecciona el documento a firmar");
cert.onchange = () => refrescar(cert, $("dropCert"), $("txCert"), "Selecciona tu certificado (.p12 / .pfx)");

const toB64 = (file) => new Promise((res) => {
  const r = new FileReader();
  r.onload = () => res(r.result.split(",")[1]);
  r.readAsDataURL(file);
});

btn.onclick = async () => {
  btn.disabled = true;
  btn.textContent = "Firmando…";
  status.className = "";
  try {
    const payload = {
      document: await toB64(doc.files[0]),
      certificate: await toB64(cert.files[0]),
      password: pass.value,
      name: doc.files[0].name,
    };
    const r = await fetch("/api/sign", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || "error al firmar");

    const bin = Uint8Array.from(atob(data.signed), (c) => c.charCodeAt(0));
    const url = URL.createObjectURL(new Blob([bin]));
    const a = document.createElement("a");
    a.href = url;
    a.download = data.filename;
    a.click();

    status.className = "ok";
    status.textContent = "Firmado por " + (data.signer || "certificado") + ". Descarga iniciada.";
  } catch (e) {
    status.className = "err";
    status.textContent = e.message;
  }
  btn.disabled = false;
  btn.textContent = "Firmar";
};
</script>
</body>
</html>
